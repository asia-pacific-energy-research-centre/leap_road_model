name: Update interface Dockerfile SHA

on:
  push:
    branches: [main]

# Only one run at a time; if a newer push arrives, wait — don't cancel.
concurrency:
  group: update-interface-sha
  cancel-in-progress: false

jobs:
  update-sha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout road_model_inputs_interface
        uses: actions/checkout@v4
        with:
          repository: H3yfinn/road_model_inputs_interface
          token: ${{ secrets.INTERFACE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Update LEAP_ROAD_MODEL_REF in Dockerfile
        run: |
          NEW_SHA="${{ github.sha }}"
          sed -i "s/ARG LEAP_ROAD_MODEL_REF=.*/ARG LEAP_ROAD_MODEL_REF=${NEW_SHA}/" Dockerfile

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --staged --quiet || git commit -m "chore: bump leap_road_model to ${{ github.sha }}"
          git pull --rebase origin main
          git push origin HEAD:main
