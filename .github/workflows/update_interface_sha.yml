name: Trigger HF Space rebuild

on:
  push:
    branches: [main]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync_to_hf workflow in interface repo
        env:
          INTERFACE_REPO_TOKEN: ${{ secrets.INTERFACE_REPO_TOKEN }}
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $INTERFACE_REPO_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/H3yfinn/road_model_inputs_interface/actions/workflows/sync_to_hf.yml/dispatches" \
            -d '{"ref":"main"}' | tee http_status
          echo ""
          cat response.json
          STATUS=$(cat http_status)
          [ "$STATUS" -eq 204 ] || { echo "Dispatch failed with HTTP $STATUS"; exit 1; }
