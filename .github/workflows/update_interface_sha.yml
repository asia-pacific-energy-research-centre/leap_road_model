name: Trigger HF Space rebuild

on:
  push:
    branches: [main]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Factory-restart HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST "https://huggingface.co/api/spaces/finbarmaunsell/leap_road_model/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN" | tee http_status
          echo ""
          cat response.json
          STATUS=$(cat http_status)
          [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 204 ] || { echo "HF restart failed with HTTP $STATUS"; exit 1; }
