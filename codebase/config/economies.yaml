# Aggregate codes (not individual economies)
aggregates:
  00_APEC: All APEC
  22_SEA: Southeast Asia
  23_NEA: Northeast Asia
  24_OAM: Other Americas
  25_OCE: Oceania
  26_NA: North America

# Region groupings (for regional defaults in Module 1)
regions:
  SEA: [02_BD, 07_INA, 10_MAS, 15_PHL, 17_SGP, 19_THA, 21_VN]
  NEA: [05_PRC, 06_HKC, 08_JPN, 09_ROK, 16_RUS, 18_CT]
  NA:  [03_CDA, 11_MEX, 20_USA]
  OAM: [04_CHL, 14_PE]
  OCE: [01_AUS, 12_NZ, 13_PNG]
