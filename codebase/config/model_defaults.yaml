# Model default parameters
# These are used when researcher-provided values are not available.
# All defaults should be clearly documented and source-flagged.

# --- Module 3: Stock target projection ---

passenger_motorisation:
  # S-curve steepness bounds
  k_min: 0.0    # flat envelope (no growth)
  k_max: 0.15   # fast upper-bound transition
  # Lookback window for energy trend calibration
  lookback_window_years: 10
  # Years excluded from energy trend calibration (COVID disruption)
  covid_exclude_years: [2020, 2021, 2022]
  # Default saturation fallback: multiple of base-year motorisation level
  # Used when no researcher-supplied saturation value is available.
  saturation_fallback_multiplier: 3.0
  # If base-year motorisation exceeds this fraction of saturation, treat as already-saturated.
  saturation_already_reached_threshold: 0.95

freight_stock:
  # GDP elasticity bounds for freight stock projection
  # Upper bound 0.3: wider than passenger k_max to reflect higher freight sensitivity to GDP.
  # Needs calibration against historical data — see Section 10 D3.
  elasticity_min: 0.0
  elasticity_max: 0.3
  # Lookback window (shared with passenger)
  lookback_window_years: 10
  covid_exclude_years: [2020, 2021, 2022]
  # Default elasticity if historical data are unreliable
  default_elasticity: 0.8

# --- Module 4: Sales, survival, vintage ---

turnover:
  # If surviving stock exceeds target stock, apply this rule.
  # Options: "allow_overshoot", "increase_scrappage", "cap_surviving_stock"
  surplus_rule: allow_overshoot
  # Minimum new sales (prevents large negative sales values)
  min_new_sales: 0

# --- Module 6: Reconciliation ---

reconciliation:
  # Simultaneous stock/mileage/efficiency adjustment weights
  # Must sum to 1.0
  stock_weight:      0.50
  mileage_weight:    0.25
  efficiency_weight: 0.25
  # Per-scalar bounds (recommended)
  # Stock has wider bounds so it can absorb residual reconciliation where needed.
  stock_scalar_min: 0.0
  stock_scalar_max: 10.0
  mileage_scalar_min: 0.85
  mileage_scalar_max: 1.15
  efficiency_scalar_min: 0.90
  efficiency_scalar_max: 1.10
  # Legacy shared bounds retained for backward compatibility with tuple(min,max)
  max_scalar: 3.0
  min_scalar: 0.33
  # Energy match tolerance (fraction of ESTO total)
  match_tolerance: 0.01

phev:
  # PHEV electric utilisation rate: fraction of km driven on electricity
  # Used when no economy-specific value is available.
  # Source: IEA (needs review — see Human Review Question D1)
  default_electric_utilisation_rate: 0.50

# --- General ---

projection:
  base_year: 2022
  end_year: 2060

# Default mileage (km/vehicle/year) by vehicle type and drive.
# Source: multinode_energy_balance road_module1_defaults.py (v2026_05_25_best_guess)
# These are starting-point defaults; researcher inputs take priority.
default_mileage_km_per_year:
  LPVs:
    ICE:  15000
    BEV:  15000
    PHEV: 15000
    FCEV: 15000
  Motorcycles:
    ICE:  8000
    BEV:  8000
    PHEV: 8000
    FCEV: 8000
  Buses:
    ICE:  50000
    BEV:  50000
    PHEV: 50000
    FCEV: 50000
  Trucks:
    ICE:  60000
    BEV:  60000
    PHEV: 60000
    FCEV: 60000
  LCVs:
    ICE:  25000
    BEV:  25000
    PHEV: 25000
    FCEV: 25000

# Default efficiency (km/GJ) by vehicle type and drive.
# Derived from multinode_energy_balance defaults (MJ/km inverted to km/GJ).
# km/GJ = 1000 / (MJ/km)
default_efficiency_km_per_gj:
