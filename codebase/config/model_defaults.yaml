# Model default parameters
# Guidance-only calibration reference.
# Do not use this file as a runtime fallback source. Model inputs must come
# through Module 1 LEAP-style inputs generated by road_model_inputs_interface
# or scripts/generate_module1_defaults.py.

# --- Module 3: Stock target projection ---

passenger_motorisation:
  # Deprecated S-curve steepness bounds retained for old notebooks/tests.
  # Current passenger projection uses GDP-per-capita income elasticity below.
  k_min: 0.0    # flat envelope (no growth)
  k_max: 0.15   # fast upper-bound transition
  # Lookback window for passenger energy and GDP-per-capita trend calibration.
  lookback_window_years: 10
  # Years excluded from trend calibration (COVID disruption).
  covid_exclude_years: [2020, 2021, 2022]
  # Passenger GDP-per-capita income elasticity bounds/default.
  passenger_income_elasticity_min: 0.0
  passenger_income_elasticity_max: 2.0
  passenger_default_income_elasticity: 0.8
  # Default saturation fallback: multiple of base-year motorisation level
  saturation_fallback_multiplier: 3.0
  # If base-year motorisation exceeds this fraction of saturation, treat as already-saturated.
  saturation_already_reached_threshold: 0.95

freight_stock:
  # GDP elasticity bounds for freight stock projection
  elasticity_min: 0.0
  elasticity_max: 2.0  # hard cap; runtime _DEFAULTS in module3_stock_targets.py
  # Lookback window (shared with passenger)
  lookback_window_years: 10
  covid_exclude_years: [2020, 2021, 2022]
  # Default elasticity if historical data are unreliable
  default_elasticity: 0.8

# --- Module 4: Sales, survival, vintage ---

turnover:
  # If surviving stock exceeds target stock, apply this rule.
  # Options: "allow_overshoot", "increase_scrappage", "cap_surviving_stock"
  surplus_rule: allow_overshoot
  # Minimum new sales (prevents large negative sales values)
  min_new_sales: 0

# --- Module 6: Reconciliation ---

reconciliation:
  # Simultaneous stock/mileage/efficiency adjustment weights
  # Must sum to 1.0
  stock_weight:      0.50
  mileage_weight:    0.25
  efficiency_weight: 0.25
  # Per-scalar bounds
  stock_scalar_min: 0.0
  stock_scalar_max: 10.0
  mileage_scalar_min: 0.85
  mileage_scalar_max: 1.15
  efficiency_scalar_min: 0.90
  efficiency_scalar_max: 1.10
  # Legacy shared bounds retained for backward compatibility with tuple(min,max)
  max_scalar: 3.0
  min_scalar: 0.33
  # Energy match tolerance (fraction of ESTO total)
  match_tolerance: 0.01

phev:
  # PHEV electric utilisation rate: fraction of km driven on electricity
  default_electric_utilisation_rate: 0.50

# --- General ---

projection:
  base_year: 2022
  end_year: 2060

# Vehicle-equivalent weights for ownership/saturation calculations.
# These convert a physical vehicle count into car-equivalent units.
# LPV = 1.0 is the reference unit.
# Used in Module 3 motorisation envelope calculation.
vehicle_equivalent_weights:
  LPVs:        1.0
  Motorcycles: 0.8
  Buses:       20.0
  Trucks:      5.0
  LCVs:        1.5

# Vehicle-equivalent weight calibration bounds.
# Module 3 uses these for passenger saturation/motorisation calibration.
vehicle_equivalent_weight_bounds:
  Motorcycles:
    lower: 0.05
    upper: 0.80
  Buses:
    lower: 8.0
    upper: 30.0

# Guidance-only mileage values (km/vehicle/year) by vehicle type and drive.
# Do not use these as runtime fallback inputs. Mileage used by the model should
# come through Module 1 LEAP-style inputs; these values are retained only as a
# calibration/reference guide when building or reviewing Module 1 data.
default_mileage_km_per_year:
  LPVs:
    ICE:  15000
    HEV:  15000
    EREV: 15000
    PHEV: 15000
    BEV:  15000
    FCEV: 15000
  Motorcycles:
    ICE:  8000
    BEV:  8000
    FCEV: 8000
  Buses:
    ICE:  50000
    BEV:  50000
    FCEV: 50000
  LCVs:
    ICE:  25000
    PHEV: 25000
    BEV:  25000
    FCEV: 25000
  Trucks:
    ICE:  60000
    BEV:  60000
    FCEV: 60000

# Guidance-only efficiency values (km/GJ) by vehicle type and drive.
# Do not use these as runtime fallback inputs. Efficiency used by the model
