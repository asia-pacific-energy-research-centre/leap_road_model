    ICE:   11800   # ~0.085 MJ/km ≈ 8.5 L/100km gasoline
    BEV:   65000   # ~0.015 MJ/km
    PHEV:  18000
    FCEV:  35000
  Motorcycles:
    ICE:   33000   # ~0.030 MJ/km
    BEV:   80000
    PHEV:  40000
    FCEV:  40000
  Buses:
    ICE:   2800    # ~0.35 MJ/km
    BEV:   6000
    PHEV:  3500
    FCEV:  5000
  Trucks:
    ICE:   2000    # ~0.50 MJ/km
    BEV:   4000
    PHEV:  2500
    FCEV:  3500
  LCVs:
    ICE:   8000    # ~0.125 MJ/km
    BEV:   18000
